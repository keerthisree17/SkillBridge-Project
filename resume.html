<div class="row">

<!-- FORM -->

<div class="col-lg-4 form-section">

<h1 class="builder-title">
Resume Builder
</h1>

<div class="glass-card">

<!-- NAME -->

<label class="form-label">
Full Name <span class="required">*</span>
</label>

<input
type="text"
id="name"
class="form-control"
placeholder="Enter full name">

<small
class="error-text"
id="nameError"></small>

<!-- ROLE -->

<label class="form-label mt-3">
Professional Role <span class="required">*</span>
</label>

<input
type="text"
id="role"
class="form-control"
placeholder="Frontend Developer">

<small
class="error-text"
id="roleError"></small>

<!-- EMAIL -->

<label class="form-label mt-3">
Email Address <span class="required">*</span>
</label>

<input
type="email"
id="email"
class="form-control"
placeholder="example@gmail.com">

<small
class="error-text"
id="emailError"></small>

<!-- PHONE -->

<label class="form-label mt-3">
Phone Number <span class="required">*</span>
</label>

<input
type="text"
id="phone"
class="form-control"
placeholder="+91 9876543210">

<small
class="error-text"
id="phoneError"></small>

<!-- LOCATION -->

<label class="form-label mt-3">
Location <span class="required">*</span>
</label>

<input
type="text"
id="location"
class="form-control"
placeholder="Visakhapatnam">

<small
class="error-text"
id="locationError"></small>

<!-- SUMMARY -->

<label class="form-label mt-3">
Professional Summary <span class="required">*</span>
</label>

<textarea
id="about"
class="form-control"
rows="5"
maxlength="300"
placeholder="Write minimum 100 characters">
</textarea>

<div class="d-flex justify-content-between">

<small>
Minimum 100 characters
</small>

<small id="charCount">
0 / 300
</small>

</div>

<small
class="error-text"
id="aboutError"></small>

<!-- EDUCATION -->

<label class="form-label mt-3">
Education <span class="required">*</span>
</label>

<textarea
id="education"
class="form-control"
rows="4"
placeholder="Diploma in Computer Science Engineering">
</textarea>

<small
class="error-text"
id="educationError"></small>

<!-- EXPERIENCE -->

<label class="form-label mt-3">
Experience
</label>

<textarea
id="experience"
class="form-control"
rows="3"
placeholder="Optional">
</textarea>

<!-- PROJECTS -->

<label class="form-label mt-3">
Projects <span class="required">*</span>
</label>

<textarea
id="projects"
class="form-control"
rows="4"
placeholder="SkillBridge Platform">
</textarea>

<small
class="error-text"
id="projectsError"></small>

<!-- SKILLS -->

<label class="form-label mt-3">
Skills <span class="required">*</span>
</label>

<input
type="text"
id="skills"
class="form-control"
placeholder="HTML, CSS, JavaScript">

<small
class="error-text"
id="skillsError"></small>

<!-- PHOTO -->

<label class="form-label mt-4">
Profile Photo
</label>

<input
type="file"
id="imageUpload"
class="form-control">

<!-- BUTTONS -->

<button
class="btn btn-success w-100 mt-4"
onclick="generateResume()">

Generate Resume

</button>

<button
class="btn btn-light w-100 mt-3"
onclick="downloadPDF()">

Download PDF

</button>

</div>

</div>

<!-- PREVIEW -->

<div class="col-lg-8 preview-section">

<div
class="resume-preview"
id="resumePreview">

<!-- LEFT -->

<div class="resume-left">

<img
src="https://i.pravatar.cc/150"
id="previewImage"
class="preview-img">

<h2 id="previewName">
Your Name
</h2>

<p class="role-text"
id="previewRole">

Frontend Developer

</p>

<div class="contact-box">

<h3>
Contact
</h3>

<p id="previewEmail"></p>

<p id="previewLocation"></p>

</div>

<div class="skills-box">

<h3>
Skills
</h3>

<div id="previewSkills"></div>

</div>

</div>

<!-- RIGHT -->

<div class="resume-right">

<div class="resume-section-box">

<h2>
Professional Summary
</h2>

<p id="previewAbout"></p>

</div>

<div class="resume-section-box">

<h2>
Education
</h2>

<p id="previewEducation"></p>

</div>

<div class="resume-section-box">

<h2>
Experience
</h2>

<p id="previewExperience"></p>

</div>

<div class="resume-section-box">

<h2>
Projects
</h2>

<p id="previewProjects"></p>

</div>

</div>

</div>

</div>
