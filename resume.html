</head>

id="navbarNav">

<ul class="navbar-nav ms-auto">

<!-- NAVBAR SPACE -->

<div style="height:90px;"></div>

<div class="container-fluid">

<div class="row">

<!-- FORM SECTION -->

<div class="col-lg-4 form-section">

<h1 class="builder-title">
Resume Builder
</h1>

<div class="glass-card">

<!-- NAME -->

<label class="form-label">
Full Name
</label>

<input
type="text"
id="name"
class="form-control"
placeholder="Enter full name">

<!-- ROLE -->

<label class="form-label mt-3">
Professional Role
</label>

<input
type="text"
id="role"
class="form-control"
placeholder="Frontend Developer">

<!-- EMAIL -->

<label class="form-label mt-3">
Email Address
</label>

<input
type="email"
id="email"
class="form-control"
placeholder="example@gmail.com">

<!-- PHONE -->

<label class="form-label mt-3">
Phone Number
</label>

<input
type="text"
id="phone"
class="form-control"
placeholder="+91 9876543210">

<!-- LOCATION -->

<label class="form-label mt-3">
Location
</label>

<input
type="text"
id="location"
class="form-control"
placeholder="Visakhapatnam">

<!-- SUMMARY -->

<label class="form-label mt-3">
Professional Summary
</label>

<textarea
id="about"
class="form-control"
rows="5"
placeholder="Write your professional summary">
</textarea>

<!-- EDUCATION -->

<label class="form-label mt-3">
Education
</label>

<textarea
id="education"
class="form-control"
rows="4"
placeholder="Diploma in Computer Science Engineering">
</textarea>

<!-- EXPERIENCE -->

<label class="form-label mt-3">
Experience
</label>

<textarea
id="experience"
class="form-control"
rows="3"
placeholder="Frontend Developer Intern">
</textarea>

<!-- PROJECTS -->

<label class="form-label mt-3">
Projects
</label>

<textarea
id="projects"
class="form-control"
rows="4"
placeholder="SkillBridge Platform">
</textarea>

<!-- SKILLS -->

<label class="form-label mt-3">
Skills
</label>

<input
type="text"
id="skills"
class="form-control"
placeholder="HTML, CSS, JavaScript">

<!-- IMAGE -->

<label class="form-label mt-4">
Profile Photo
</label>

<input
type="file"
id="imageUpload"
class="form-control">

<!-- BUTTONS -->

<button
class="btn btn-success w-100 mt-4"
onclick="generateResume()">

Generate Resume

</button>

<button
class="btn btn-light w-100 mt-3"
onclick="downloadPDF()">

Download PDF

</button>

</div>

</div>

<!-- PREVIEW SECTION -->

<div class="col-lg-8 preview-section">

<div
class="resume-preview"
id="resumePreview">

<!-- LEFT SIDE -->

<div class="resume-left">

<img
src="https://i.pravatar.cc/150"
id="previewImage"
class="preview-img"
alt="Profile Image">

<h2 id="previewName">
Your Name
</h2>

<p
class="role-text"
id="previewRole">

Frontend Developer

</p>

<div class="contact-box">

<h3>
Contact
</h3>

<p id="previewEmail"></p>

<p id="previewLocation"></p>

</div>

<div class="skills-box">

<h3>
Skills
</h3>

<p id="previewSkills"></p>

</div>

</div>

<!-- RIGHT SIDE -->

<div class="resume-right">

<div class="resume-section-box">

<h2>
Professional Summary
</h2>

<p id="previewAbout"></p>

</div>

<div class="resume-section-box">

<h2>
Education
</h2>

<p id="previewEducation"></p>

</div>

<div class="resume-section-box">

<h2>
Experience
</h2>

<p id="previewExperience"></p>

</div>

<div class="resume-section-box">

<h2>
Projects
</h2>

<p id="previewProjects"></p>

</div>

</div>

</div>

</div>

</div>

</div>

<!-- Bootstrap JS -->

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

<!-- PDF -->

<script
src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
</script>

<!-- JS -->

<script src="js/script.js"></script>

</body>

</html>
